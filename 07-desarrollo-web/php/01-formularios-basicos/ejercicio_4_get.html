<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicio 4 - Método GET</title>
    <link rel="stylesheet" href="estilos.css" />
  </head>
  <body>
    <main class="contenedor">
      <section class="tarjeta">
        <h1>Ejercicio 4 - Método GET</h1>

        <p class="descripcion">
          Ingresar el nombre, precio y cantidad de un producto para calcular el subtotal, IGV y
          total a pagar.
        </p>

        <form action="ejercicio_4_get.php" method="GET" class="formulario">
          <div class="grupo">
            <label for="nombre">Nombre del producto:</label>
            <input type="text" id="nombre" name="nombre" required />
          </div>

          <div class="grupo">
            <label for="precio">Precio del producto: S/</label>
            <input type="number" id="precio" name="precio" min="0.01" step="0.01" required />
          </div>

          <div class="grupo">
            <label for="cantidad">Cantidad:</label>
            <input type="number" id="cantidad" name="cantidad" min="1" required />
          </div>

          <button type="submit" class="boton">Calcular total</button>
        </form>

        <br />

        <a href="index.html" class="enlace">Volver al menú principal</a>
      </section>
    </main>
  </body>
</html>
