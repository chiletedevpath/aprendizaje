<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Reporte HTML</title>
	<link rel="stylesheet" href="bulma.css">
</head>
<body>

<span class="tag is-large is-primary">Listado de notas</span>
<table class="table is-hoverable">
	<thead>
		<tr>
			<th>Foto</th>
			<th>Nombre</th>
			<th>Edad</th>
			<th>Pc1</th>
			<th>Pc2</th>
			<th>Pc3</th>
			<th>Ef</th>
			<th>Prom</th>
		</tr>
	</thead>
	<tbody>
		<tr>
		                   <td>
		                       <figure class="image is-64x64">
		                           <span>%s</span>
		                       </figure>
		                   </td>
		                   <td>%s</td>
		                   <td>%d</td>
		                   <td>%s</td>
		                   <td>%.2f</td>
		                   <td>%s</td>
		                   <td>%b</td>
		               </tr>
	</tbody>
	<tfoot>
		<tr>
			<th colspan="7">Promedio Total</th>
			<th>16</th>
		</tr>
	</tfoot>
</table>

</body>
</html>
